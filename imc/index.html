<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Calculadora de IMC</title>
    <!-- favicon -->
    <link rel="icon" type="image/png" href="images/favicon.png">
    <!-- CSS-->
     <link rel="stylesheet" href="css/estilo.css">
</head>

<body> 
    <div class="formulario">
        <h2>Dados do Paciente</h2>
        <form id="formIMC" onsubmit="processaCalculo(event)">
            <label for="nome">Nome Completo</label>
            <input type="text" id="nome" placeholder="Ex : richard sales" minlength="3" maxlength="100" required title="informe o seu nome completo">
            
            <label for="nascimento">Data de Nascimento</label>
            <input type="date" id="nascimento" required> 

            <label for="peso">Peso (Kg)</label>
            <input type="number" id="peso" step="0.1" min="0" max="350" placeholder="Ex: 70.5" title="informe o seu peso sem Kg" required>

            <label for="altura">Altura (m)</label>
            <input type="number" id="altura" step="0.01" min="1" max="2,50" placeholder="Ex: 1.75" title="informe sua altura em metros" required>
            
            <button type="submit">Calcular o Resultado</button>
            <button type="reset" class="limpar">Limpar</button>
        </form>
    </div>
    <div id="resultado">

    </div>
    <!--Carregando o JS -->

    <script src="js/script.js"></script>
</body>

</html>
